<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CropFlex — Professional Image Framing Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <div class="logo">Crop<span>Flex</span></div>
        <div class="status-badge" id="imageInfo">No file loaded</div>
    </header>

    <main class="app-workspace">
        <!-- Control Sidebar (Left side, horizontal fields) -->
        <section class="control-panel">
            <label class="btn btn-primary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Import Image
                <input type="file" id="upload" accept="image/*">
            </label>
            
            <div class="input-group">
                <span class="input-label">Width (px)</span>
                <input type="number" id="width" value="200" min="10">
            </div>
            
            <div class="input-group">
                <span class="input-label">Height (px)</span>
                <input type="number" id="height" value="200" min="10">
            </div>
            
            <button id="openSaveModalBtn" class="btn btn-success" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Export Image
            </button>
        </section>

        <!-- Canvas Workspace (Right side) -->
        <section class="canvas-panel">
            <div class="canvas-container" id="canvasContainer">
                <canvas id="canvas"></canvas>
                <div class="canvas-placeholder" id="placeholderText">
                    <p>Your workspace will appear here once an image is imported.</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Naming Modal (Popup) -->
    <div class="modal-overlay" id="saveModal">
        <div class="modal-box">
            <h3>Export Settings</h3>
            <p>Choose a name for your cropped image asset:</p>
            <div class="modal-input-wrapper">
                <input type="text" id="filenameInput" value="cropped-asset">
                <span>.png</span>
            </div>
            <div class="modal-actions">
                <button id="cancelModalBtn" class="btn btn-secondary">Cancel</button>
                <button id="confirmDownloadBtn" class="btn btn-success">Download</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
